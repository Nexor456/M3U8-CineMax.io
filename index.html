<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 CineMax</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 90%;
            max-width: 800px;
        }
        video {
            width: 100%;
            height: auto;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="video" controls></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const videoUrl = window.location.pathname.replace('/M3U8-CineMax.io/', '') + (window.location.pathname.includes('?') ? window.location.search : '?m3u8=true');
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(window.location.href.replace('index.html', '') + 'video.m3u8');
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = window.location.href.replace('index.html', '') + 'video.m3u8';
        }
    </script>
</body>
</html>
